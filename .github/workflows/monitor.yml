name: 💚 Health Check

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  check-npm-sync:
    name: 🏥 Package Health
    runs-on: ubuntu-latest

    steps:
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏷️ Check versions
        id: versions
        run: |
          NPM_VERSION=$(npm view brand-voice version 2>/dev/null || echo "not-found")
          echo "npm_version=${NPM_VERSION}" >> $GITHUB_OUTPUT

          GITHUB_VERSION=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name // "not-found"' | sed 's/v//')
          echo "github_version=${GITHUB_VERSION}" >> $GITHUB_OUTPUT

          echo "📊 Version Check:"
          echo "  npm latest:    ${NPM_VERSION}"
          echo "  GitHub latest: ${GITHUB_VERSION}"

      - name: 📦 Test installation
        run: |
          mkdir -p test-install && cd test-install
          npm init -y --silent

          if npm install brand-voice --silent; then
            echo "✅ Package installs successfully"

            node -e "
              const fs = require('fs');
              try {
                const pkg = JSON.parse(fs.readFileSync('node_modules/brand-voice/package.json', 'utf8'));
                console.log('✅ Package metadata accessible');
                console.log('  Name:', pkg.name);
                console.log('  Version:', pkg.version);
              } catch (e) {
                console.error('❌ Package metadata check failed:', e.message);
                process.exit(1);
              }
            "
          else
            echo "❌ Package installation failed"
            exit 1
          fi

          cd .. && rm -rf test-install

      - name: 📏 Check package size
        run: |
          PACKAGE_INFO=$(npm view brand-voice --json 2>/dev/null || echo "{}")

          if [[ "$PACKAGE_INFO" != "{}" ]]; then
            UNPACKED_SIZE=$(echo "$PACKAGE_INFO" | jq -r '.dist.unpackedSize // 0')
            FORMATTED_SIZE=$(echo "$UNPACKED_SIZE" | awk '{
              if ($1 >= 1048576) printf "%.1f MB", $1/1048576;
              else if ($1 >= 1024) printf "%.1f KB", $1/1024;
              else printf "%d B", $1;
            }')
            echo "Unpacked size: ${FORMATTED_SIZE}"

            if [[ $UNPACKED_SIZE -gt 10485760 ]]; then
              echo "⚠️ Package exceeds 10MB — check for accidental inclusions"
            else
              echo "✅ Package size within limits"
            fi
          fi

      - name: 📋 Health report
        if: always()
        run: |
          echo "## 💚 Package Health Report" >> $GITHUB_STEP_SUMMARY
          echo "**Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Version Status" >> $GITHUB_STEP_SUMMARY
          echo "- **npm latest**: \`${{ steps.versions.outputs.npm_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub latest**: \`${{ steps.versions.outputs.github_version }}\`" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.versions.outputs.npm_version }}" == "${{ steps.versions.outputs.github_version }}" ]]; then
            echo "- **Status**: ✅ Versions in sync" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: ⚠️ Version mismatch detected" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [npm package](https://www.npmjs.com/package/brand-voice)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Report critical issues
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'package-health',
              state: 'open',
              per_page: 1
            });

            if (issues.length > 0) {
              console.log('Open health issue already exists, skipping creation');
              return;
            }

            const body = [
              '## Package Health Issue Detected',
              '',
              'The automated health check has detected issues with the published package.',
              '',
              '**Check Details:**',
              '- **npm Version**: ${{ steps.versions.outputs.npm_version }}',
              '- **GitHub Version**: ${{ steps.versions.outputs.github_version }}',
              '',
              '**Action Required:**',
              'Please review the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) and take appropriate action.',
              '',
              '*Auto-generated by Package Health Monitor*',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Package Health Check Failed',
              body,
              labels: ['bug', 'monitoring', 'package-health']
            });
