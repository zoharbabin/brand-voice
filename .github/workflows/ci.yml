name: ✅ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Test · Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20.x, 22.x]
      max-parallel: 2

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build

      - name: 🧪 Run tests
        run: npm test
        env:
          NODE_ENV: test
          CI: true

  lint:
    name: 📝 Lint & Types
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build TypeScript
        run: npm run build

      - name: 🔎 Type check
        run: npm run typecheck

      - name: ✅ Verify bin entry points
        run: |
          node -e "
            const pkg = require('./package.json');
            const bins = Object.keys(pkg.bin || {});
            if (bins.length === 0) { console.error('❌ No bin entries in package.json'); process.exit(1); }
            console.log('✅ bin entries:', bins.join(', '));
          "

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Audit dependencies
        run: |
          echo "## 🔒 Security Audit Results" >> $GITHUB_STEP_SUMMARY
          if npm audit --audit-level=high 2>&1; then
            echo "✅ No high/critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Vulnerabilities found — review output above" >> $GITHUB_STEP_SUMMARY
            npm audit || true
            exit 1
          fi

  publish-ready:
    name: 📋 Publish Readiness
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build

      - name: 🧪 Run prepublishOnly
        run: npm run prepublishOnly

      - name: 📦 Dry-run pack
        run: |
          OUTPUT=$(npm pack --dry-run 2>&1)
          echo "$OUTPUT"
          echo "## 📦 Package Contents" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" | tail -20 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
